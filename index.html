
<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, interactive-widget=resizes-content" />
    
    <!-- Google Search Console Verification (replace YOUR_CODE with actual verification code from GSC) -->
    <!-- <meta name="google-site-verification" content="YOUR_GSC_VERIFICATION_CODE" /> -->

    <!-- Primary Meta Tags -->
    <title>Apply AI - AI-Powered Recruitment Platform | Pilot Program Now Open</title>
    <meta name="title" content="Apply AI - AI-Powered Recruitment Platform | Pilot Program Now Open" />
    <meta name="description" content="Join Apply AI&#39;s AI-powered recruitment platform. Voice Apply technology, Tenstreet integration, predictive analytics, and 100+ job board distribution. Early adopter pricing available.">
    <meta name="author" content="Apply AI" />
    <meta name="keywords" content="AI recruitment platform, Apply AI, AI recruiting, pilot program, early adopter, Tenstreet integration, Voice Apply, recruitment analytics, job board distribution, automated screening, HR technology">
    <meta name="robots" content="index, follow" />
    <meta name="language" content="English" />
    <meta name="revisit-after" content="7 days" />
    
    <!-- Canonical URL -->
    <link rel="canonical" href="https://applyai.jobs/" />
    
    <!-- hreflang Tags for International SEO -->
    <link rel="alternate" hreflang="en-US" href="https://applyai.jobs/" />
    <link rel="alternate" hreflang="x-default" href="https://applyai.jobs/" />
    
    <!-- Favicon -->
    <link rel="icon" type="image/png" href="https://storage.googleapis.com/gpt-engineer-file-uploads/LQPr9z5dzLVzw8XP92diy1GjByo1/uploads/1767986175823-apple-touch-icon.png">
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon.png" />
    <link rel="icon" type="image/png" sizes="16x16" href="/favicon.png" />
    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png" />
    <link rel="icon" type="image/png" sizes="512x512" href="/icon-512.png" />
    
    
    <!-- Theme Color - Navy Blue + Teal brand -->
    <meta name="theme-color" content="#1e3a5f" />
    <meta name="msapplication-TileColor" content="#1e3a5f" />
    
    <!-- Open Graph / Facebook -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://applyai.jobs/" />
    
    
    <meta property="og:image" content="https://storage.googleapis.com/gpt-engineer-file-uploads/LQPr9z5dzLVzw8XP92diy1GjByo1/social-images/social-1772298671205-E0A37966-730D-47C7-AFCB-96633C1DF742.webp">

    <meta property="og:image:height" content="630" />
    <meta property="og:site_name" content="Apply AI" />
    <meta property="og:locale" content="en_US" />

    <!-- Twitter -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:url" content="https://applyai.jobs/" />
    <meta name="twitter:image" content="https://storage.googleapis.com/gpt-engineer-file-uploads/LQPr9z5dzLVzw8XP92diy1GjByo1/social-images/social-1772298671205-E0A37966-730D-47C7-AFCB-96633C1DF742.webp">
    <meta name="twitter:creator" content="@applyai" />
    
    <!-- LinkedIn -->
    <meta property="og:image:alt" content="Apply AI - AI-Powered Recruitment Platform Dashboard" />
    
    <!-- Structured Data - Organization + LocalBusiness -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": ["Organization", "LocalBusiness"],
      "name": "Apply AI",
      "url": "https://applyai.jobs",
      "logo": "https://applyai.jobs/logo.png",
      "description": "AI-powered recruitment platform with Voice Apply technology, Tenstreet integration, and predictive analytics. Join our pilot program with early adopter pricing.",
      "sameAs": [
        "https://twitter.com/applyai",
        "https://linkedin.com/company/applyai"
      ],
      "contactPoint": [
        {
          "@type": "ContactPoint",
          "contactType": "Customer Service",
          "email": "support@applyai.jobs",
          "availableLanguage": ["English"],
          "areaServed": "US"
        },
        {
          "@type": "ContactPoint",
          "contactType": "Sales",
          "email": "sales@applyai.jobs",
          "availableLanguage": ["English"],
          "areaServed": "US"
        }
      ],
      "address": {
        "@type": "PostalAddress",
        "streetAddress": "1400 Quintard Ave",
        "addressLocality": "Anniston",
        "addressRegion": "AL",
        "postalCode": "36201",
        "addressCountry": "US"
      },
      "geo": {
        "@type": "GeoCoordinates",
        "latitude": 33.6598,
        "longitude": -85.8313
      },
      "foundingDate": "2024",
      "numberOfEmployees": {
        "@type": "QuantitativeValue",
        "value": "10-50"
      }
    }
    </script>
    
    <!-- Structured Data - WebSite with Search -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "WebSite",
      "name": "Apply AI",
      "url": "https://applyai.jobs",
      "potentialAction": {
        "@type": "SearchAction",
        "target": {
          "@type": "EntryPoint",
          "urlTemplate": "https://applyai.jobs/search?q={search_term_string}"
        },
        "query-input": "required name=search_term_string"
      }
    }
    </script>
    
    <!-- Structured Data - SoftwareApplication -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "SoftwareApplication",
      "name": "Apply AI",
      "applicationCategory": "BusinessApplication",
      "operatingSystem": "Web",
      "offers": {
        "@type": "Offer",
        "price": "299",
        "priceCurrency": "USD"
      },
      "description": "AI-powered recruitment platform with Voice Apply technology, Tenstreet integration, predictive analytics, and 100+ job board distribution. Join our pilot program with early adopter pricing."
    }
    </script>
    
    <!-- Structured Data - WebPage with Speakable for AI Search -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "WebPage",
      "name": "Apply AI - AI-Powered Recruitment Platform",
      "description": "AI-powered recruitment platform with Voice Apply technology, Tenstreet integration, and predictive analytics.",
      "speakable": {
        "@type": "SpeakableSpecification",
        "cssSelector": ["h1", ".hero-description", ".feature-title", "main h2"]
      },
      "mainEntity": {
        "@type": "SoftwareApplication",
        "name": "Apply AI",
        "applicationCategory": "BusinessApplication"
      }
    }
    </script>
    
    <!-- Performance Hints -->
    <link rel="preconnect" href="https://auwhcdpppldjlcaxzsme.supabase.co">

    <link rel="preconnect" href="https://fonts.googleapis.com">

    <link rel="dns-prefetch" href="https://api.elevenlabs.io">
    <link rel="preconnect" href="https://api.elevenlabs.io" crossorigin>

    <link rel="dns-prefetch" href="https://cdn.jsdelivr.net">
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&display=swap" rel="stylesheet">
    
    <!-- Security Headers -->
    <meta http-equiv="X-Content-Type-Options" content="nosniff">
    <meta http-equiv="X-XSS-Protection" content="1; mode=block">
    <meta name="referrer" content="strict-origin-when-cross-origin">
